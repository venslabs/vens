version: 2
updates:
- package-ecosystem: gomod
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  groups:
    # init, autobuild and analyze must move together, otherwise analyze fails
    # with "Loaded a configuration file for version X, but running version Y".
    codeql-action:
      patterns:
      - "github/codeql-action*"
