name: CI
on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:

permissions:
  contents: read

jobs:
  main:
    permissions:
      contents: read  # for actions/checkout to fetch code
      pull-requests: read  # for golangci/golangci-lint-action to fetch pull requests
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 'stable'

      - name: Unit tests
        run: go test -covermode=atomic -race -v ./pkg/...

      - name: Integration tests
        run: go test -v ./cmd/vens/... -run TestScript

      - name: Resolve golangci-lint version
        id: golangci
        run: echo "version=$(make print-golangci-version)" >> "$GITHUB_OUTPUT"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: ${{ steps.golangci.outputs.version }}
          args: --timeout=10m --verbose

      - run: go install ./cmd/vens
